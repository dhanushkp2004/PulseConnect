{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="cyber-glass-card p-4 p-md-5 border-cyan-glow"
            style="border: 1px solid rgba(0, 229, 255, 0.2) !important;">
            <h2 class="text-center mb-4 text-cyan-neon fw-bold">Admin Portal</h2>
            <p class="text-center text-white mb-4">Enter Administrative credentials.
            </p>

            <form action="/admin_login" method="POST">
                <div class="mb-3">
                    <label class="form-label text-cyan-neon">Username</label>
                    <input type="text" class="form-control" name="username">
                </div>

                <div class="mb-4">
                    <label class="form-label text-cyan-neon">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control border-end-0" name="password" required>
                        <button class="btn btn-outline-secondary border-start-0 bg-transparent text-cyan-neon" type="button" onclick="togglePassword(this)" style="opacity: 0.7;">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit"
                    class="btn btn-cyber-outline w-100 rounded-pill py-2 text-white border-cyan-glow shadow-sm"
                    style="background: rgba(0, 229, 255, 0.05);">
                    <i class="bi bi-shield-lock me-2"></i> Login
                </button>
            </form>

            <div class="mt-4 pt-3 border-top border-secondary opacity-50 text-center">
                <a href="/login" class="text-white text-decoration-none small">Standard User Login</a>
            </div>
        </div>
    </div>
</div>

<style>
    .border-cyan-glow {
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
    }
</style>
{% endblock %}
