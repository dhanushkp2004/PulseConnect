{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="cyber-glass-card p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="display-4 text-cyan-neon mb-3">
                    <i class="bi bi-key-fill"></i>
                </div>
                <h2 class="text-white fw-bold">Forgot Password?</h2>
                <p class="text-white-50">Enter your email address and we'll send you a 6-digit code to reset your password.</p>
            </div>

            <form action="/forgot-password" method="POST">
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" name="email" placeholder="name@example.com" required autofocus>
                </div>

                <button type="submit" class="btn btn-cyber-crimson w-100 rounded-pill py-2 text-white fw-bold">
                    Send Reset Code
                </button>
            </form>

            <div class="text-center mt-4 border-top border-white-10 pt-3">
                <a href="/login" class="text-white-50 text-decoration-none small">
                    <i class="bi bi-arrow-left me-1"></i> Back to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
